services:
  backend:
    build: ./backend
    env_file: .env
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - db
  db:
    image: postgres:18
    volumes:
      - postgres_db:/var/lib/postgresql
    env_file: .env
    ports:
      - "5432:5432"

volumes:
  postgres_db:
